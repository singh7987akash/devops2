name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Build Backend
      run: |
        cd backend
        npm install
        # Add npm test here when tests are written

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build
        # Add npm test here when tests are written

    - name: Build Docker Images
      run: |
        docker-compose build
