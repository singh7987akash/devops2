<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Akash Tasks | Premium</title>
    <!-- Google Fonts for Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- FullCalendar -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
  </head>
  <body>
    <div class="background-animation"></div>
    
    <div class="app-container">
      <nav class="top-nav">
        <div class="nav-left">
          <h2>Nexus <span>Akash</span> <span>Tasks</span></h2>
        </div>
        <div class="nav-right">
          <span id="userNameDisplay">Welcome, User</span>
          <button id="themeToggle" class="icon-btn" title="Toggle Dark Mode">🌙</button>
          <button id="logoutBtn" class="icon-btn" title="Logout">🚪</button>
        </div>
      </nav>

      <header class="app-header">
        <p>Elevate your productivity.</p>
      </header>

      <main class="app-main">
        <!-- Task Creation Form -->
        <section class="task-form-section glass-panel">
          <h2>Create New Task</h2>
          <form id="taskForm">
            <div class="input-group">
              <input type="text" id="taskTitle" placeholder="What needs to be done?" required />
            </div>
            <div class="input-group">
              <textarea id="taskDescription" placeholder="Add some details..." rows="2"></textarea>
            </div>
            
            <div class="form-row">
              <div class="input-group half">
                <label class="input-label">Priority</label>
                <select id="taskPriority" class="premium-input">
                  <option value="low">Low</option>
                  <option value="medium" selected>Medium</option>
                  <option value="high">High</option>
                </select>
              </div>
              <div class="input-group half">
                <label class="input-label">Category</label>
                <input type="text" id="taskCategory" class="premium-input" placeholder="e.g. Work, Personal" />
              </div>
            </div>

            <div class="input-group">
              <label class="input-label">Subtasks (comma separated)</label>
              <input type="text" id="taskSubtasks" class="premium-input" placeholder="e.g. Draft email, Review code" />
            </div>

            <div class="input-group">
              <label for="taskReminder" class="input-label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-top; margin-right: 4px;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Set a Reminder (Optional)
              </label>
              <div class="datetime-wrapper">
                <input type="datetime-local" id="taskReminder" class="premium-input" />
              </div>
            </div>
            <button type="submit" class="btn-primary">
              <span class="btn-text">Add Task</span>
              <div class="btn-glow"></div>
            </button>
          </form>
        </section>

        <!-- Task List / Views -->
        <section class="task-list-section glass-panel">
          <div class="list-controls">
            <input type="text" id="searchInput" placeholder="Search tasks..." class="premium-input search-input" />
            <button id="exportBtn" class="btn-secondary" title="Export to CSV">📥 Export CSV</button>
          </div>
          
          <div class="list-header" style="margin-top: 1.5rem;">
            <div class="view-toggles">
              <button class="view-btn active" data-view="list">☰ List</button>
              <button class="view-btn" data-view="kanban">◫ Kanban</button>
              <button class="view-btn" data-view="calendar">📅 Calendar</button>
            </div>
            <div class="filter-group">
              <button class="filter-btn active" data-filter="all">All</button>
              <button class="filter-btn" data-filter="pending">Pending</button>
              <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
          </div>
          
          <!-- Views Container -->
          <div id="viewsContainer">
            <!-- List View -->
            <div id="listView" class="view-section active">
              <div id="taskList" class="task-list">
                <div class="loader"></div>
              </div>
            </div>
            
            <!-- Kanban View -->
            <div id="kanbanView" class="view-section" style="display: none;">
              <div class="kanban-board">
                <div class="kanban-column">
                  <h3>To Do</h3>
                  <div class="kanban-tasks" id="kanbanPending" data-status="pending"></div>
                </div>
                <div class="kanban-column">
                  <h3>Done</h3>
                  <div class="kanban-tasks" id="kanbanCompleted" data-status="completed"></div>
                </div>
              </div>
            </div>
            
            <!-- Calendar View -->
            <div id="calendarView" class="view-section" style="display: none;">
              <div id="calendar"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
